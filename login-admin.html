<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Admin Login</h2>

  <div class="mx-auto" style="max-width:400px;">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">
    <button id="loginBtn" class="btn btn-success w-100">Login</button>
    <p id="error" class="text-danger mt-2"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKFyCBc27NCDB4EMBpb_XoNUlkb6Y_ke4",
  authDomain: "ahlulkvoluntee.firebaseapp.com",
  databaseURL: "https://ahlulkvoluntee-default-rtdb.firebaseio.com",
  projectId: "ahlulkvoluntee",
  storageBucket: "ahlulkvoluntee.firebasestorage.app",
  messagingSenderId: "4307021315",
  appId: "1:4307021315:web:8b66d8e09792bad3e16836"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "admin.html";
  } catch (err) {
    document.getElementById("error").innerText = "Invalid login details";
  }
};
</script>
<style>
    body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;

  /* Animated gradient background */
  background: linear-gradient(-45deg, #00c9a7, #00b4d8, #90dbf4, #00c9a7);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;

  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Gradient animation */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Login card */
.login-box {
  background: rgba(255,255,255,0.95);
  padding: 40px 30px;
  border-radius: 18px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  text-align: center;

  animation: popIn 0.7s ease;
}

@keyframes popIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

/* Title */
.login-box h2 {
  color: #008b8b;
  margin-bottom: 20px;
  font-weight: 700;
}

/* Inputs */
.login-box input {
  width: 100%;
  padding: 13px;
  margin-bottom: 15px;
  border: 2px solid #e0f7f7;
  border-radius: 10px;
  font-size: 14px;
  transition: 0.3s;
}

.login-box input:focus {
  border-color: #00c9a7;
  outline: none;
  box-shadow: 0 0 12px rgba(0,201,167,0.3);
}

/* Button */
.login-box button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;

  background: linear-gradient(90deg, #00c9a7, #00b4d8);
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.login-box button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 8px 20px rgba(0,180,216,0.4);
}

/* Error */
.error-msg {
  color: #ff4d6d;
  font-size: 13px;
  margin-top: 10px;
}

</style>
</body>
</html>
